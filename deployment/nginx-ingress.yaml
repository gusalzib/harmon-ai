apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /users/
        pathType: Prefix # This one I'm copying blindly
        backend:
          service:
            name: users-service
            port:
              number: 8000

# Notes:
# Same may be used for prediction service, 
# only need to change name, image and only maaaybe containerport?

apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-app-deployment
  labels:
    app: training-app
spec: 
  # Create three replicas of [pod templates?] whose labels match training-app
  replicas: 2
  selector:
    matchLabels:
      app: training-app
  # Defining pod template
  template:
    metadata:
      labels:
        app: training-app
    spec:
      containers:
      - name: training-app
        image: TRAINING_IMAGE_PLACEHOLDER
        imagePullPolicy: Always  
        ports:
        - containerPort: 8000
        resources:
              requests:
                cpu: "250m"         
                memory: "8Gi"    
              limits:
                cpu: "4"
                memory: "16Gi"
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/key.json"

        volumeMounts:
        - name: gcp-key-volume
          mountPath: /var/secrets/google
          readOnly: true

      volumes:
        - name: gcp-key-volume
          secret:
            secretName: gcp-auth
---
# Service bit
# Forward request to the appropriate pods
# Docs: https://kubernetes.io/docs/concepts/services-networking/service/
apiVersion: v1
kind: Service
metadata:
  name: training-service
spec:
  type: ClusterIP
  selector:
    app: training-app  # Docs use different selector
  ports:
  - protocol: TCP
    port: 8000        # Port of which this service is accessible
    targetPort: 8000  # Port of the pods belonging to the service


